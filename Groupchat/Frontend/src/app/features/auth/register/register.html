<div class="flex items-center justify-center min-h-screen gradient-bg relative overflow-hidden">
  <div class="orb floating bg-primary-container w-[400px] h-[400px] -top-20 -left-20"></div>
  <div class="orb floating bg-tertiary-container w-[300px] h-[300px] -bottom-20 -right-20" style="animation-delay: -5s;"></div>

  <main class="w-full max-w-lg px-container-padding-mobile md:px-container-padding-desktop z-10">
    <div class="flex flex-col items-center mb-8 mt-3">
      <div class="w-12 h-12 bg-primary-container rounded-xl flex items-center justify-center mb-4 shadow-lg shadow-primary-container/20">
        <span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings: 'FILL' 1;">forum</span>
      </div>
      <h1 class="font-headline-lg text-headline-lg text-on-surface tracking-tight">Pingora</h1>
      <p class="font-body-sm text-body-sm text-on-surface-variant mt-1">High-performance secure communication</p>
    </div>

    <div class="glass-card p-8 md:p-10 rounded-[2rem] relative overflow-hidden">
      <div class="mb-8">
        <div class="flex justify-between items-end mb-3">
          <div class="flex flex-col">
            <span class="font-label-xs text-label-xs text-primary uppercase tracking-widest mb-1">Account Setup</span>
            <h2 class="font-headline-md text-headline-md text-on-surface">Step 1 of 2: Basic Info</h2>
          </div>
        </div>
        <div class="step-progress">
          <div class="step-progress-fill"></div>
        </div>
      </div>

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-5">
        <div class="space-y-2">
          <label class="font-label-md text-label-md text-on-surface-variant ml-1" for="full-name">Full Name</label>
          <div class="input-pill flex items-center px-4 py-3.5 rounded-2xl">
            <span class="material-symbols-outlined text-on-surface-variant mr-3 text-[20px]">person</span>
            <input
              id="full-name"
              formControlName="fullName"
              type="text"
              placeholder="Enter your full name"
              class="bg-transparent border-none outline-none w-full text-on-surface font-body-sm placeholder:text-outline/50 p-0 focus:ring-0"
            />
          </div>
        </div>

        <div class="space-y-2">
          <label class="font-label-md text-label-md text-on-surface-variant ml-1" for="email">Work Email</label>
          <div class="input-pill flex items-center px-4 py-3.5 rounded-2xl">
            <span class="material-symbols-outlined text-on-surface-variant mr-3 text-[20px]">mail</span>
            <input
              id="email"
              formControlName="email"
              type="email"
              placeholder="name@company.com"
              class="bg-transparent border-none outline-none w-full text-on-surface font-body-sm placeholder:text-outline/50 p-0 focus:ring-0"
            />
          </div>
        </div>

        <div class="space-y-2">
          <label class="font-label-md text-label-md text-on-surface-variant ml-1" for="password">Password</label>
          <div class="input-pill flex items-center px-4 py-3.5 rounded-2xl">
            <span class="material-symbols-outlined text-on-surface-variant mr-3 text-[20px]">lock</span>
            <input
              id="password"
              formControlName="password"
              [type]="showPassword ? 'text' : 'password'"
              placeholder="Create a secure password"
              (input)="onPasswordInput($any($event.target).value)"
              class="bg-transparent border-none outline-none w-full text-on-surface font-body-sm placeholder:text-outline/50 p-0 focus:ring-0"
            />
            <button type="button" (click)="togglePassword()" class="text-on-surface-variant hover:text-on-surface transition-colors">
              <span class="material-symbols-outlined text-[20px]">{{ showPassword ? 'visibility_off' : 'visibility' }}</span>
            </button>
          </div>
          <div class="flex gap-1 mt-2 px-1">
            <div *ngFor="let i of [0,1,2,3]" class="strength-bar flex-1 rounded-full" [style.background-color]="barColor(i)"></div>
          </div>
          <p class="font-label-xs text-label-xs text-on-surface-variant ml-1 mt-1">{{ strengthText() }}</p>
        </div>

        <button
          type="submit"
          class="primary-cta w-full py-4 px-6 rounded-2xl text-on-primary-fixed font-label-md flex items-center justify-center gap-2 mt-4 shadow-lg shadow-primary-container/10"
        >
          <span>Continue to Profile Setup</span>
          <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
        </button>
      </form>

      <div class="flex items-center my-8">
        <div class="flex-1 h-[1px] bg-outline-variant/30"></div>
        <span class="px-4 font-label-xs text-label-xs text-on-surface-variant uppercase tracking-widest">Or sign up with</span>
        <div class="flex-1 h-[1px] bg-outline-variant/30"></div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <button class="flex items-center justify-center gap-2 py-3 px-4 rounded-xl border border-outline-variant/30 bg-surface-container-low hover:bg-surface-container transition-all active:scale-95">
          <span class="material-symbols-outlined text-on-surface-variant text-[20px]">vpn_key</span>
          <span class="font-label-md text-label-md text-on-surface">SSO</span>
        </button>
        <button class="flex items-center justify-center gap-2 py-3 px-4 rounded-xl border border-outline-variant/30 bg-surface-container-low hover:bg-surface-container transition-all active:scale-95">
          <span class="material-symbols-outlined text-on-surface-variant text-[20px]">phonelink_setup</span>
          <span class="font-label-md text-label-md text-on-surface">Device</span>
        </button>
      </div>
    </div>

    <div class="mt-8 text-center">
      <p class="font-body-sm text-body-sm text-on-surface-variant">
        Already have an account?
        <a class="text-primary font-bold hover:underline ml-1" href="/login">Sign in</a>
      </p>
    </div>
  </main>
</div>
