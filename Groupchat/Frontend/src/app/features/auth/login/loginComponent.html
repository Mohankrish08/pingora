<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-4 antialiased">
  <div class="fixed top-[-10%] left-[-10%] w-[40vw] h-[40vw] rounded-full bg-primary/5 blur-[120px] pointer-events-none z-0"></div>
  <div class="fixed bottom-[-10%] right-[-10%] w-[30vw] h-[30vw] rounded-full bg-tertiary/5 blur-[100px] pointer-events-none z-0"></div>

  <main class="w-full max-w-md relative z-10">
    <div class="glass-card rounded-[24px] p-8 md:p-10 transition-all duration-500 hover:shadow-2xl">
      <div class="text-center mb-10">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-surface-container-highest mb-6 shadow-inner border border-outline-variant/30">
          <span class="material-symbols-outlined text-primary text-[32px]" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
        </div>
        <h1 class="text-[32px] font-bold text-on-surface mb-2 tracking-tight">Pingora</h1>
        <p class="text-sm text-on-surface-variant">High-performance secure communication</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
        <div class="space-y-2 group">
          <label class="text-[13px] font-semibold text-on-surface block ml-1" for="email">Email Address</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">mail</span>
            <input
              id="email"
              formControlName="email"
              type="email"
              placeholder="name@company.com"
              class="input-glass w-full rounded-xl py-3 pl-12 pr-4 text-base text-on-surface focus:outline-none focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all placeholder:text-on-surface-variant/50"
            />
          </div>
          <p *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid" class="text-error text-xs ml-1">
            Enter a valid email address.
          </p>
        </div>

        <div class="space-y-2 group">
          <div class="flex justify-between items-center ml-1">
            <label class="text-[13px] font-semibold text-on-surface" for="password">Password</label>
            <a class="text-[11px] font-medium text-primary hover:text-primary-fixed transition-colors" href="#">Forgot?</a>
          </div>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">lock</span>
            <input
              id="password"
              formControlName="password"
              [type]="showPassword ? 'text' : 'password'"
              placeholder="••••••••"
              class="input-glass w-full rounded-xl py-3 pl-12 pr-12 text-base text-on-surface focus:outline-none focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all placeholder:text-on-surface-variant/50"
            />
            <button type="button" (click)="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors focus:outline-none">
              <span class="material-symbols-outlined text-[20px]">{{ showPassword ? 'visibility' : 'visibility_off' }}</span>
            </button>
          </div>
        </div>

        <div class="pt-2 space-y-6">
          <label class="flex items-center space-x-3 cursor-pointer group w-max">
            <input type="checkbox" formControlName="rememberMe" class="w-4 h-4 rounded accent-primary" />
            <span class="text-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
          </label>
          <button type="submit" class="btn-primary-gradient w-full rounded-xl py-3.5 text-[13px] font-bold shadow-lg shadow-primary/20 hover:shadow-primary/40 hover:-translate-y-0.5 active:translate-y-0 active:scale-[0.98] transition-all flex items-center justify-center space-x-2">
            <span>Sign In</span>
            <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
          </button>
        </div>
      </form>

      <div class="my-8 flex items-center">
        <div class="flex-grow border-t border-outline-variant/30"></div>
        <span class="px-4 text-[11px] text-on-surface-variant uppercase tracking-widest">or continue with</span>
        <div class="flex-grow border-t border-outline-variant/30"></div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <button type="button" class="btn-ghost rounded-xl py-2.5 px-4 flex items-center justify-center space-x-2 hover:bg-surface-variant/30 transition-colors active:scale-95">
          <span class="material-symbols-outlined text-[20px] text-on-surface">vpn_key</span>
          <span class="text-[13px] font-semibold text-on-surface">SSO</span>
        </button>
        <button type="button" class="btn-ghost rounded-xl py-2.5 px-4 flex items-center justify-center space-x-2 hover:bg-surface-variant/30 transition-colors active:scale-95">
          <span class="material-symbols-outlined text-[20px] text-on-surface">devices</span>
          <span class="text-[13px] font-semibold text-on-surface">Device</span>
        </button>
      </div>
    </div>

    <div class="mt-8 text-center">
      <p class="text-sm text-on-surface-variant">
        Don't have an account?
        <a class="text-primary font-medium hover:text-primary-fixed transition-colors underline-offset-4 hover:underline" routerLink="/register">Sign up</a>
      </p>
    </div>
  </main>
</body>
